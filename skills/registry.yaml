# Claude Code Skills Registry
# Format: each entry maps a skill-id to its GitHub source.
# install_skills.sh reads this and sparse-clones each repo to fetch only needed paths.
#
# Fields:
#   id:          install target name → ~/.claude/skills/<id>/
#   category:    grouping label
#   repo:        GitHub owner/name
#   path:        path inside the repo containing SKILL.md (and any supporting files)
#   tier:        gold = SKILL.md + scripts/ + reference(s)/  | silver = SKILL.md + helper scripts/refs inline  | bronze = SKILL.md only
#   description: one-liner
#
# Curation rule: skills that benefit from executable helpers (review, debug, test,
# infra, MCP) MUST be tier ≥ silver. Pure-knowledge skills (language idioms, API
# design philosophy) can stay bronze.

skills:

  # ── Anthropic Official (gold tier — full anatomy) ──────────────────────────

  - id: mcp-builder
    category: tooling
    repo: anthropics/skills
    path: skills/mcp-builder
    tier: gold
    description: Build MCP servers — official Anthropic skill, has scripts + reference

  - id: claude-api
    category: tooling
    repo: anthropics/skills
    path: skills/claude-api
    tier: gold
    description: Claude API / Anthropic SDK across 8 languages (csharp, curl, go, java, php, python, ruby, typescript)

  # ── Engineering Practices ──────────────────────────────────────────────────

  - id: code-reviewer
    category: engineering
    repo: awesome-skills/code-review-skill
    path: .
    tier: gold
    description: Code review — pr-analyzer.py + 11-language reference docs (React 19, Vue 3, Rust, TS, Java, Python, C/C++)

  - id: debugging
    category: engineering
    repo: obra/superpowers
    path: skills/systematic-debugging
    tier: silver
    description: Systematic debugging — root-cause tracing, defense-in-depth, find-polluter.sh, condition-based-waiting examples

  - id: security-review
    category: engineering
    repo: Jeffallan/claude-skills
